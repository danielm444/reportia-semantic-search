# Docker Compose — reportia-semantic-search
# Búsqueda semántica sobre Qdrant: selección de tablas para text-to-SQL (ADR-0049)
# y, como producto, búsqueda de reportes/configuración.
#
# Topología (ADR-0049):
# - Qdrant es el ÚNICO vector store de ReportIA y vive DENTRO de este servicio.
# - El ÚNICO caller de este servicio es el BFF (nunca acceso directo desde otros).
# - El embedding se calcula vía llm-adapter (única puerta a inferencia); el modelo
#   activo lo decide el catálogo embedding_model (ADR-0047), default TEI local opt-in.
# - Todo corre en la red compartida `reportia-net` (ADR-0029); se eliminó `menu-network`.

services:
  # Base de datos vectorial (Qdrant) — único store de vectores de ReportIA (ADR-0049).
  qdrant:
    image: qdrant/qdrant:v1.7.3
    container_name: reportia-qdrant
    ports:
      - "6333:6333"  # HTTP API
      - "6334:6334"  # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - reportia-net

  # API de búsqueda semántica. Único caller = BFF. Embebe vía llm-adapter.
  reportia-semantic-search:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: reportia-semantic-search
    ports:
      - "${SEMANTIC_SEARCH_PORT:-8011}:8000"
    volumes:
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HOST=0.0.0.0
      - PORT=8000
      # Auth interno: el BFF presenta esta clave. (ADR-0049: alinear a tenant
      # headers como el resto de servicios internos es follow-up; hoy el BFF es
      # el único caller.)
      - MENU_API_KEY=${MENU_API_KEY:-dev_api_key_123}
      # Embeddings vía llm-adapter (ADR-0049 / llm-prompting #4). El modelo lo
      # decide el llm-adapter (catálogo embedding_model, default TEI local opt-in).
      - EMBEDDINGS_PROVIDER=${EMBEDDINGS_PROVIDER:-llm_adapter}
      - EMBEDDINGS_DIM=${EMBEDDINGS_DIM:-1024}
      - LLM_ADAPTER_URL=${LLM_ADAPTER_URL:-http://reportia-llm-adapter:8003}
      # Qdrant
      - QDRANT_URL=${QDRANT_URL:-http://reportia-qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-saved_queries}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - reportia-net
    depends_on:
      - qdrant

volumes:
  qdrant_data:
    driver: local

# Red compartida del stack de ReportIA (creada por la infra base).
networks:
  reportia-net:
    external: true
